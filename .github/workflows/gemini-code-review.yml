name: Code Review with Gemini CLI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - '.gitignore'

jobs:
  code-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Gemini CLI
        run: pip install google-generativeai

      - name: Run Gemini code review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Get the diff of the PR
          git diff origin/${{ github.base_ref }}...HEAD > pr.diff

          python << 'EOF'
          import google.generativeai as genai
          import os

          genai.configure(api_key=os.environ.get('GEMINI_API_KEY'))
          model = genai.GenerativeModel('gemini-2.0-flash')

          with open('pr.diff', 'r') as f:
              diff_content = f.read()

          if not diff_content.strip():
              with open('review.md', 'w') as f:
                  f.write("No significant code changes detected for review.")
              exit(0)

          prompt = f"""
          You are an expert senior software engineer performing a code review.
          Review the following git diff for:
          1. Potential bugs or logical errors.
          2. Security vulnerabilities.
          3. Code style and maintainability improvements.
          4. Performance optimizations.

          Provide your feedback in Markdown format. Be concise and constructive.

          Diff:
          {diff_content}
          """

          response = model.generate_content(prompt)
          with open('review.md', 'w') as f:
              f.write(response.text)
          EOF

      - name: Comment review on PR
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const reviewFile = 'review.md';
            if (fs.existsSync(reviewFile)) {
              const review = fs.readFileSync(reviewFile, 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: review
              });
            }
